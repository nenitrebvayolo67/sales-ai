<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales AI - Usetreno</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--bg2:#111114;--bg3:#18181c;--bg4:#1e1e24;
  --brd:rgba(255,255,255,0.07);--brdh:rgba(255,255,255,0.14);
  --tx:#eeedf2;--tx2:#8a8999;--tx3:#4a4958;
  --ac:#6c5ce7;--acd:rgba(108,92,231,0.12);--acb:rgba(108,92,231,0.3);
  --gn:#00b894;--gnd:rgba(0,184,148,0.1);--gnb:rgba(0,184,148,0.25);
  --rd:#e17055;--rdd:rgba(225,112,85,0.1);
  --am:#fdcb6e;--amd:rgba(253,203,110,0.1);
  --bl:#74b9ff;--bld:rgba(116,185,255,0.1);
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* SETUP */
#setup{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;align-items:center;justify-content:center;}
.setup-box{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:40px;width:420px;max-width:95vw;text-align:center;}
.setup-logo{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);letter-spacing:.15em;margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:8px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px var(--ac);}
.setup-box h2{font-size:22px;font-weight:600;margin-bottom:8px;}
.setup-box p{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.6;}
.setup-inp{width:100%;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:12px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--tx);margin-bottom:12px;outline:none;}
.setup-inp:focus{border-color:var(--acb);}
.setup-btn{width:100%;padding:12px;background:var(--ac);border:none;border-radius:var(--r);color:#fff;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.02em;}
.setup-btn:hover{opacity:.88;}

/* APP LAYOUT */
.app{display:flex;flex:1;overflow:hidden;}

/* LEFT SIDEBAR - clients only */
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--brd);}
.sb-brand{font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);letter-spacing:.15em;display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.sb-new{width:100%;padding:8px 12px;background:var(--acd);border:1px solid var(--acb);border-radius:var(--r);color:var(--ac);font-family:'Sora',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:center;}
.sb-new:hover{background:rgba(108,92,231,.2);}
.sb-clients{flex:1;overflow-y:auto;padding:8px;}
.sb-clients::-webkit-scrollbar{width:3px;}
.sb-clients::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px;}
.sb-lbl{font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:.12em;text-transform:uppercase;padding:6px 6px 4px;}
.ci{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .15s;}
.ci:hover{background:var(--bg3);}
.ci.on{background:var(--acd);border:1px solid var(--acb);}
.ci-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;min-width:28px;background:var(--bg4);color:var(--tx2);}
.ci.on .ci-av{background:var(--acb);color:var(--ac);}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:12.5px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.ci.on .ci-name{color:var(--tx);}
.ci-status{font-size:9px;margin-top:2px;}
.s-z{color:var(--gn);}
.s-r{color:var(--am);}
.s-u{color:var(--bl);}
.s-n{color:var(--rd);}
.ci-del{width:18px;height:18px;display:none;align-items:center;justify-content:center;background:transparent;border:none;color:var(--tx3);cursor:pointer;border-radius:4px;font-size:14px;flex-shrink:0;}
.ci:hover .ci-del{display:flex;}
.ci-del:hover{color:var(--rd);}
.sb-foot{padding:10px 14px;border-top:1px solid var(--brd);display:flex;flex-direction:column;gap:4px;}
.sb-foot-btn{padding:6px 10px;background:transparent;border:1px solid var(--brd);border-radius:var(--r);color:var(--tx3);font-family:'Sora',sans-serif;font-size:10px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px;width:100%;}
.sb-foot-btn:hover{border-color:var(--brdh);color:var(--tx2);}

/* MAIN AREA */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}

/* TOP BAR */
.topbar{padding:12px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.tb-client{flex:1;min-width:0;}
.tb-name{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-sub{font-size:11px;color:var(--tx3);margin-top:1px;font-family:'DM Mono',monospace;}
.tb-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.tb-sel{padding:6px 10px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);color:var(--tx2);font-family:'Sora',sans-serif;font-size:11px;cursor:pointer;outline:none;}
.tb-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;font-size:15px;color:var(--tx2);position:relative;}
.tb-btn:hover{border-color:var(--brdh);color:var(--tx);}
.tb-btn.on{background:var(--acd);border-color:var(--acb);color:var(--ac);}
.tb-btn-lbl{font-size:9px;font-family:'DM Mono',monospace;}

/* PHASE BAR */
.phase-bar{display:flex;gap:4px;padding:8px 20px;border-bottom:1px solid var(--brd);flex-shrink:0;overflow-x:auto;align-items:center;}
.phase-bar::-webkit-scrollbar{height:0;}
.phase-lbl{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-right:6px;white-space:nowrap;}
.ph{padding:5px 13px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--brd);color:var(--tx3);background:transparent;font-family:'Sora',sans-serif;white-space:nowrap;transition:all .2s;}
.ph:hover{border-color:var(--brdh);color:var(--tx2);}
.ph.on{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600;box-shadow:0 2px 12px rgba(108,92,231,0.4);}

/* NOTES PANEL */
.notes-bar{border-bottom:1px solid var(--brd);padding:10px 20px;display:none;gap:10px;align-items:flex-start;flex-shrink:0;}
.notes-bar.vis{display:flex;}
.notes-inp{flex:1;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:7px 12px;color:var(--tx);font-family:'Sora',sans-serif;font-size:12.5px;resize:none;outline:none;min-height:36px;max-height:80px;}
.notes-inp:focus{border-color:var(--acb);}
.notes-save{padding:7px 14px;background:var(--acd);border:1px solid var(--acb);border-radius:var(--r);color:var(--ac);font-size:12px;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap;}

/* SCRIPT HINT */
.script-hint{border-bottom:1px solid var(--brd);padding:8px 20px;display:none;flex-shrink:0;}
.script-hint.vis{display:block;}
.sh-lbl{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:4px;}
.sh-txt{font-size:12px;color:var(--tx2);line-height:1.6;}
.sh-txt strong{color:var(--ac);}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--tx3);text-align:center;}
.empty-ico{font-size:36px;margin-bottom:8px;}
.empty-t{font-size:14px;font-weight:500;color:var(--tx2);}
.empty-s{font-size:12px;line-height:1.6;max-width:280px;}

/* MESSAGES */
.msg-u{display:flex;justify-content:flex-end;}
.msg-bbl{background:var(--acd);border:1px solid var(--acb);border-radius:var(--rl);border-bottom-right-radius:3px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:70%;}
.msg-lbl{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace;margin-bottom:4px;text-align:right;}
.ai-wrap{display:flex;flex-direction:column;gap:8px;max-width:90%;}

/* SITUATION */
.situation{background:var(--bg2);border:1px solid var(--brd);border-left:2px solid var(--ac);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--tx2);line-height:1.6;}
.situation-lbl{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace;letter-spacing:.08em;display:block;margin-bottom:3px;}

/* RESPONSE CARDS */
.rcard{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;}
.rcard:hover{border-color:var(--brdh);}
.rcard-top{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;}
.badge{font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;}
.badge-p{background:var(--gnd);color:var(--gn);border:1px solid var(--gnb);}
.badge-r{background:var(--amd);color:var(--am);border:1px solid rgba(253,203,110,.3);}
.badge-i{background:var(--bld);color:var(--bl);border:1px solid rgba(116,185,255,.3);}
.cpbtn{margin-left:auto;padding:4px 10px;background:transparent;border:1px solid var(--brd);border-radius:6px;color:var(--tx3);font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;flex-shrink:0;transition:all .15s;}
.cpbtn:hover{border-color:var(--brdh);color:var(--tx2);}
.cpbtn.ok{border-color:var(--gn);color:var(--gn);}
.rcard-body{padding:12px 14px;}
.rcard-txt{font-size:13.5px;line-height:1.75;color:var(--tx);}
.rcard-next{margin-top:8px;font-size:11px;color:var(--ac);font-family:'DM Mono',monospace;padding-top:8px;border-top:1px solid var(--brd);}
.rcard-next::before{content:'DALSI KROK: ';}
.rcard-tip{margin-top:6px;font-size:11.5px;color:var(--gn);padding-top:8px;border-top:1px solid var(--brd);}

/* INFO CARD */
.info-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;}
.info-top{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;}
.info-body{padding:12px 14px;}
.info-txt{font-size:13.5px;line-height:1.75;color:var(--tx);}
.info-ctip{margin-top:10px;padding:10px 12px;background:var(--gnd);border:1px solid var(--gnb);border-radius:var(--r);font-size:12px;color:var(--gn);line-height:1.6;}
.info-ctip strong{display:block;font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:4px;opacity:.7;}

/* SUMMARY */
.summary{background:var(--bg2);border:1px solid var(--gnb);border-left:3px solid var(--gn);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--tx2);line-height:1.7;max-width:90%;}
.summary strong{color:var(--gn);font-size:9px;display:block;margin-bottom:6px;font-family:'DM Mono',monospace;letter-spacing:.1em;}

/* ERROR */
.err-card{background:var(--rdd);border:1px solid rgba(225,112,85,.2);border-radius:var(--r);padding:12px 14px;font-size:12.5px;color:var(--rd);line-height:1.6;max-width:90%;}

/* LOADING */
.loading{display:flex;align-items:center;gap:5px;padding:14px 16px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);width:90px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1.1)}}

/* PANEL DRAWER - for KB, Dodav, Fraze */
.drawer{position:fixed;top:0;right:0;width:380px;max-width:95vw;height:100vh;background:var(--bg2);border-left:1px solid var(--brd);z-index:50;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.drawer-head{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;}
.drawer-title{font-size:14px;font-weight:600;flex:1;}
.drawer-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;font-size:16px;color:var(--tx2);}
.drawer-close:hover{border-color:var(--brdh);color:var(--tx);}
.drawer-tabs{display:flex;border-bottom:1px solid var(--brd);}
.dtab{flex:1;padding:8px;font-size:11px;text-align:center;cursor:pointer;color:var(--tx3);border:none;background:transparent;font-family:'Sora',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;}
.dtab.on{color:var(--ac);border-bottom-color:var(--ac);}
.drawer-content{flex:1;overflow-y:auto;padding:12px;}
.drawer-content::-webkit-scrollbar{width:3px;}
.drawer-content::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px;}
.kb-cat{font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;padding:8px 4px 4px;}
.kb-row{padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;font-size:12.5px;color:var(--tx2);transition:background .15s;}
.kb-row:hover{background:var(--bg3);color:var(--tx);}
.kb-row.on{background:var(--gnd);color:var(--gn);}
.kb-detail-view{display:none;flex-direction:column;gap:10px;}
.kb-detail-view.vis{display:flex;}
.kb-back{padding:6px 12px;background:transparent;border:1px solid var(--brd);border-radius:var(--r);color:var(--tx3);font-size:11px;cursor:pointer;font-family:'Sora',sans-serif;align-self:flex-start;}
.kb-back:hover{border-color:var(--brdh);color:var(--tx2);}
.kb-detail-title{font-size:15px;font-weight:600;}
.kb-detail-link{font-size:11px;color:var(--ac);text-decoration:none;}
.kb-detail-link:hover{text-decoration:underline;}
.kb-detail-content{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:12px 14px;font-size:12px;line-height:1.75;color:var(--tx2);white-space:pre-wrap;}
.kb-detail-tip{background:var(--gnd);border:1px solid var(--gnb);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--gn);line-height:1.6;}
.kb-detail-tip strong{display:block;font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:4px;}
.kb-ask-btn{padding:8px 14px;background:var(--acd);border:1px solid var(--acb);border-radius:var(--r);color:var(--ac);font-size:12px;font-family:'Sora',sans-serif;cursor:pointer;align-self:flex-start;}
.phrase-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);background:var(--bg3);margin-bottom:4px;font-size:12px;color:var(--tx2);}
.phrase-item span{flex:1;}
.p-use{padding:3px 8px;background:transparent;border:1px solid var(--brd);border-radius:4px;color:var(--tx3);font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;}
.p-use:hover{border-color:var(--ac);color:var(--ac);}
.p-del{padding:2px 6px;background:transparent;border:none;color:var(--tx3);font-size:14px;cursor:pointer;}
.p-del:hover{color:var(--rd);}
.add-phrase{display:flex;gap:6px;margin-top:8px;}
.add-phrase input{flex:1;padding:8px 10px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);color:var(--tx);font-family:'Sora',sans-serif;font-size:12px;outline:none;}
.add-phrase input:focus{border-color:var(--acb);}
.add-phrase button{padding:8px 12px;background:var(--acd);border:1px solid var(--acb);border-radius:var(--r);color:var(--ac);font-size:12px;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap;}
.overlay{position:fixed;inset:0;z-index:49;background:rgba(0,0,0,.4);display:none;}
.overlay.vis{display:block;}

/* INPUT */
.input-area{border-top:1px solid var(--brd);padding:12px 20px 14px;background:var(--bg2);flex-shrink:0;}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.chip{padding:4px 11px;font-size:11px;background:var(--bg4);border:1px solid var(--brd);border-radius:20px;color:var(--tx3);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;}
.chip:hover{background:var(--bg3);border-color:var(--brdh);color:var(--tx2);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
textarea#ibox{flex:1;min-height:42px;max-height:120px;padding:11px 14px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rl);color:var(--tx);font-family:'Sora',sans-serif;font-size:13.5px;line-height:1.5;resize:none;outline:none;transition:border-color .2s;}
textarea#ibox:focus{border-color:var(--acb);}
textarea#ibox::placeholder{color:var(--tx3);}
.send{padding:11px 18px;background:var(--ac);border:none;border-radius:var(--rl);color:#fff;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;letter-spacing:.02em;}
.send:hover{opacity:.85;}
.send:disabled{opacity:.3;cursor:not-allowed;}

/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:24px 28px;width:320px;max-width:95vw;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:6px;}
.modal p{font-size:12px;color:var(--tx3);margin-bottom:14px;}
.modal-inp{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);color:var(--tx);font-family:'Sora',sans-serif;font-size:13px;outline:none;margin-bottom:14px;}
.modal-inp:focus{border-color:var(--acb);}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;}
.m-no{padding:8px 16px;background:transparent;border:1px solid var(--brd);border-radius:var(--r);color:var(--tx3);font-family:'Sora',sans-serif;font-size:13px;cursor:pointer;}
.m-yes{padding:8px 16px;background:var(--ac);border:none;border-radius:var(--r);color:#fff;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
</style>
</head>
<body>

<div id="setup">
  <div class="setup-box">
    <div class="setup-logo"><span class="sdot"></span>SALES AI · USETRENO</div>
    <h2>Pripojeni</h2>
    <p>Vloz URL Cloudflare Workeru pro aktivaci AI.</p>
    <input class="setup-inp" type="text" id="setupInp" placeholder="https://dark-dream-de7c.nepouzitejucet.workers.dev" />
    <button class="setup-btn" id="setupBtn">Spustit</button>
  </div>
</div>

<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-brand"><span class="sdot"></span>SALES AI</div>
      <button class="sb-new" id="newClientBtn">+ Novy klient</button>
    </div>
    <div class="sb-clients">
      <div class="sb-lbl">Klienti</div>
      <div id="clientsList"></div>
    </div>
    <div class="sb-foot">
      <button class="sb-foot-btn" id="changeUrlBtn">Zmenit URL</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="tb-client">
        <div class="tb-name" id="tbName">Vyberte klienta</div>
        <div class="tb-sub" id="tbSub">zvolte klienta ze seznamu vlevo</div>
      </div>
      <div class="tb-actions">
        <button class="tb-btn" id="summaryBtn" title="Shrnuti hovoru">&#128196;</button>
        <button class="tb-btn" id="drawerBtn" title="Znalosti a dodavatele">&#128218;</button>
      </div>
    </div>



    <!-- PHASE BAR -->
    <div class="phase-bar">
      <div class="phase-lbl">FAZE HOVORU:</div>
      <div id="phases" style="display:flex;gap:4px;align-items:center;"></div>

var KB = [
  {id:'dok',cat:'Procesy',t:'Dokumenty ke smlouve',link:'',tip:'',c:'STANDARDNI ZMENA DODAVATELE:\nPosledni vyuctovani + smlouva od soucasneho dodavatele.\nZakaznik vypovedel sam: dodat akceptaci vypovedi.\n\nPODNIKATEL / ICO:\nVZDY faktura + smlouva.\nBez smlouvy = klient musi vypovidat SAM a dodat AKCEPTACI.\nSVJ vice podpisu: generovat POUZE PRE nebo CEZ - rucni podpis, posilat na info@usetreno.cz\n\nBEZ FAKTURY (neni rok u dodavatele):\nFaktura = staci sama o sobe.\nBEZ FAKTURY: dolozi uvitaci dopis + smlouva.\nVYJIMKA doba neurcita bez faktury: misto uvitaciho dopisu staci ROZPIS ZALOH + smlouva.\n\nCENTROPOL: vzdy dodat veskere VOP.\nINNOGY: prvni + druhou stranu smlouvy.'},
  {id:'ter',cat:'Procesy',t:'Terminy a vypovedi',link:'',tip:'',c:'HRANICNI TERMINY PRO EXPORT:\nCEZ, Lama, EON, Centropol, DE, Innogy: 10 prac. dni.\nYello, PRE: 17 prac. dni.\nMND: 12 prac. dni.\n\nVYPOVEDNI LHUTY:\nDoba urcita: 20 dni.\nDoba neurcita: 3 mesice.\nSPOT: 1 mesic.\n\nURGENTNI - rizikova pokud mene nez 30 dni:\nUsetreno ~15 dni, partneri ~10 dni, OTE min 10 dni.\n\nVYPOVED ZAKAZNIKEM:\nVygenerovat 30 dni pred zmenou.\nPodepsana na BO 5 dni pred.\nPredano partnerovi 3 dny pred.'},
  {id:'mez',cat:'Procesy',t:'Mezidodavatel',link:'',tip:'',c:'NA SMLOUVU uvadime dodavatele ktereho budeme VYPOVEDAT = kdo aktualne dodava!\n\nYello a MND: mohou vypovidat po zahajeni dodavky.\nEON, PRE, PPAS, CEZ a dalsi: NE.\n\nVYPOVIDA ZAKAZNIK: funguje u vsech.\n\nPOZNAMKA v Sove:\nOP: Mezidodavatel [jmeno] zakaznik vypovida sam k datu dd.mm.rrrr'},
  {id:'auk',cat:'Procesy',t:'Aukcni spolecnost',link:'',tip:'',c:'Aukcni spolecnost = zprostredkovatel s plnou moci za zakaznika.\n\nDULEZITE: smlouvu lze zrusit nejpozdeji 15 dni po zahajeni dodavky!\n\nMND a EON vypovida za klienty.\n\nZname: Terra Group, Simply Energy, Ceska aukce, D-test, A Tender.'},
  {id:'fve',cat:'Procesy',t:'Fotovoltaika FVE',link:'',tip:'',c:'DULEZITE: NESJEDNAVAME vykup z FVE u zadneho dodavatele!\n\nJEDINA VYJIMKA - MND SOLARNI UCET:\nPoplatek: 60 Kc za mesic.\nPrve 2 MWh: klient dostane 1 000 Kc za MWh.\nKazda dalsi MWh (2+): 500 Kc za MWh.\nPriklad: 3 MWh = 1000+1000+500 = 2 500 Kc minus 60 Kc mesicne.\nSolarni ucet MND: pouze DOMACNOSTI, NE pro ICO!\n\nFVE zakaznikovi: budeme resit beznou dodavku, vykup si doresi sam.'},
  {id:'dpi',cat:'Pojmy',t:'DPI - Dodavatel posledni instance',link:'',tip:'',c:'DPI nastupuje automaticky kdyz dodavatel nemuze dodavat.\nRegulo vane ceny OTE.\n\nPo 6 mesicich hrozi neopravneny odber!\nPRE: jednu vyzvu a IHNED odpoji!\n\nResit OKAMZITE jako urgentni smlouvu.'},
  {id:'odch',cat:'Pojmy',t:'Odchylka ve spotrebe',link:'',tip:'Vetsi dodavatele lepe ridi portfolio = nizsi odchylky = levnejsi cena. Argument pro CEZ, EON nebo PRE.',c:'Odchylka = rozdil mezi predpokladanou a skutecnou spotrebou.\n\nJAK ZAKAZNIKOVI:\nPredstavte si ze si objednate 100 litru vody ale spotrebujete 80 - za tech 20 litru zaplatite navic. Dodavatele funguji stejne s elektrinou na burze. Vetsi dodavatele to lepe ridi.'},
  {id:'trh',cat:'Argumenty',t:'Proc resit DNES - situace na trhu',link:'',tip:'',c:'TIP: Pane nebo pani, situace z minuleho tydne zmenila pravidla hry. To co platilo pred 14 dny uz neplati. Moje prace je zajistit abyste na tenhle globalni konflikt nedoplatili z vlastni kapsy.\n\n--- ARGUMENT 1: EVROPA PRISLA O POJISTKU ---\nDotad jsme se uklidnovali ze rusky plyn nahradime plynem z Kataru.\nJenze Katar ted kvuli valce s Iranem zastavil tezbu.\nEvropa ma zasobniky naplnene jen z 30 procent a nema cim doplnit.\nPokud nezafixujete ted, riskujete ze v lete podepiste smlouvy za dvojnasobne ceny.\n\n--- ARGUMENT 2: TRH NEREAGUJE NA SPEKULACE ALE NA REALITU ---\nTankery s plynem fyzicky stoji pred prilivem a nemohou projet.\nDodavatele v CR uz ty burzovni skoky zacinaji promitatdo novych ceniku.\nMate doslova dny nez ty nejlevnejsi tarify zmizi.\n\n--- ARGUMENT 3: EFEKT SNEHOVE KOULE ---\nValka v Iranu zdrazuje ropu.\nRopa zdrazuje dopravu a plyn zdrazuje vyrobu elektriny.\nJe to reteazova reakce.\nTed mate posledni sanci urvat cenu z doby pred timto tydnem.\n\n--- ARGUMENT 4: STAT VAS NEOCHRANI ---\nVlada sice zrusila poplatky za POZE, ale to usetri par stovek.\nPokud plyn na burze kvuli Iranu zdrazi o 50 procent, vase faktura vyleti o tisice.\nJedina skutecna ochrana je fixace u stabilniho dodavatele prave ted.'},
  {id:'7bod',cat:'Argumenty',t:'7 bodu prodeje',link:'',tip:'',c:'Definice prodeje: Presvedcit nekoho o necem.\n\n1. NADSENI\nVychazi z vnitrniho nadseni. Mas svuj cil. Pohyb, usmev, energie, pozitivni mysleni.\n\n2. ZAUJETI ZKZ - 4 faktory\nImage, Prirozenenost, Vseobecny prehled, Dobra nalada.\n\n3. ICE BREAK\nOtevreni krabicky a zjisteni potreb.\nPostup: Souhlas > Cervene tlacitko > Vztah > Duvera.\nCervene tlacitko je uprimne - jde od srdce.\n\n4. PREZENTACE - 5 bodu\nKratka, Strucna, Vystizna, Individualni, PRAVDIVA.\n\n5. PRODEJ CENY\nCena se vzdy prodava, nikdy se neoznamuje.\nCena je vzdy mala a to co za ni zakaznik ziska je obrovske.\n\n6. UZAVRENI - vzdy za zakaznika\nMaximalizace, Sugesce, Reference, FOL - fear of lost = strach ze ztraty.\n\n7. UZAMCENI\nZamezeni odstoupeni od koupeni.\nVracime namitky ktere jeste nevyvstaly.\nJsem si 100 procent jisty ze klient rozumi.'},
  {id:'kontakt',cat:'Kontakty',t:'Infolinky dodavatelu',link:'',tip:'',c:'=== DODAVATELE ===\n\nCEZ\nInfolinka: 800 810 820\nEmail: cez@cez.cz\nPobocky: Praha, Brno, Ostrava, Plzen, HK, Usti n.L., Ceske Budejovice\n\nINNOGY\nInfolinka: 800 113 355\nEmail: info@innogy.cz\nPobocky: Praha, Brno, Ostrava, Plzen, HK, Olomouc, Liberec\n\nPRAZSKA PLYNARENSKA - PPAS\nInfolinka: 800 134 134\nEmail: callcetrum@ppas.cz\nPobocky: Praha\n\nCENTROPOL\nInfolinka: 478 575 555\nEmail: obchod@centropol.cz\nPobocky: Praha, C. Budejovice, Plzen, Usti n.L., HK\n\nEON\nInfolinka: 800 77 33 22\nEmail: info@eon.cz\nPobocky: Brno, C. Budejovice, Jihlava, Zlin, Olomouc, Trebic\n\nYELLO\nInfolinka: 267 056 704\nEmail: yello@yello.cz\n\nMND\nInfolinka: 800 400 500\nEmail: mnd@mnd.cz\nPobocky: Hodonin, Brno, Praha\n\nPRE\nInfolinka: 800 55 00 55\nEmail: pre@pre.cz\nPobocky: Praha\n\nLAMA ENERGY\nInfolinka: 840 111 310\nEmail: zakaznik@lamaenergy.cz\nPobocky: Ostrava, Olomouc, Praha\n\nEP ENERGY\nInfolinka: 232 005 200\nEmail: info@epenergy.cz\nPobocky: Praha, Brno\n\nSPP\nInfolinka: 800 789 789\nEmail: info@spp.cz\nPobocky: Praha, Brno\n\n=== DISTRIBUCE ===\n\nCEZ Distribuce\nInfolinka: 800 850 860\nEmail: info@cezdistribuce.cz\n\nPRE Distribuce\nInfolinka: 800 550 066\nEmail: info@predistribuce.cz\n\nEGD - EON Distribuce\nInfolinka: 800 22 55 77\nEmail: info@egd.cz\n\nPPAS Distribuce\nInfolinka: 267 175 222\nEmail: info@ppdistribuce.cz\n\nGasnet\nInfolinka: 555 901 010\nEmail: info@gasnet.cz'},
  {id:'tip',cat:'Techniky',t:'Straight Line + obchodni framework',link:'',tip:'',c:'STRAIGHT LINE: Vedes klienta od OPEN k CLOSE po prime linii.\nFrame: Ty vedes, klient mluvi, ale ty ridis flow.\nMentalni nastaveni: Nepresvedcuju ho. Pomaham mu udelat spravne rozhodnuti.\n\nTHREE 10s - klient musi mit 10 z 10 v:\n1. PRODUKT - tohle realne dava smysl\n2. TY - tomuhle cloveku verim\n3. FIRMA - nebude to scam\nNamitka = signal ze jedna z nich neni splnena. Doplnit jistotu.\n\nLOOPING:\nNevracis -> vysvetlis -> zpet na close.\nPriklad: Poslete mi to do mailu -> Jasne poslu, jen at poslu presne co dava smysl... co vas na tom zatim brzdi?\n\nTONALITA:\nAbsolutni jistota: Tohle je ted pro vas nejlepsi reseni.\nReasonable man: Dava to smysl, ne?\nUprimnost: Reknu vam to na rovinu...\n\nCLOSE - neptas se, vedes:\nSPATNE: Chcete do toho jit?\nSPRAVNE: Udelame to takhle - nastavime vam to od dalsiho obdobi, jo?'}

var DODAV = [
  {id:'cez',n:'CEZ',link:'https://www.cez.cz/nextcez/cs/ceniky',tip:'CEZ je statni firma - to je nejsilnejsi argument. Rekni: Pane/pani, CEZ je z 70% ve vlastnictvi statu - tahle firma neskrachuje. A letos jiz 5x zlevnil. To je ta jistota o ktere mluvime.',c:'PROFIL: Nejvetsi dodavatel, 1,6 mil. zakazniku, z 70% statni. Nejspolehlivejsi znacka v energetice.\nPRODUKTY 2025/2026: Fix elektrina 2 roky ~3 400 Kc/MWh. Bez fixace ~3 860 Kc/MWh. Fix plyn ~1 150 Kc/MWh.\nSILNE STRANKY: Statni firma = neskrachuje. Nejvetsi distribucni sit. Letos 5x zlevnil. Aplikace MUJ CEZ.\nSLABE STRANKY: Ceny ne vzdy nejlepsi na trhu. Horsi zakaznicka podpora.\nPRO KOHO: Klienti co chteji istotu, starsi zakaznici, ti co se boji po Bohemia Energy.\nINFO: 800 810 820 | cez@cez.cz'},

  {id:'mnd',n:'MND',link:'https://www.mnd.cz/',tip:'MND ma vlastni tezbu plynu - Plyn z prvni ruky. Rekni: MND jako jediny dodavatel v CR tezi vlastni plyn na Morave. Neni zavisly na dovozu. To je ta realny rozdil ktery pocitite na cene.',c:'PROFIL: Moravske naftove doly, jediny CR dodavatel s vlastni tezbu plynu. Silna pozice v plynu.\nMND SOLARNI UCET (jedina FVE moznost):\n- Poplatek: 60 Kc/mesic\n- Prvni 2 MWh: 1 000 Kc/MWh\n- Kazda dalsi MWh: 500 Kc/MWh\n- Priklad: 3 MWh = 2 500 Kc minus poplatek 60 Kc/mes\n- POUZE pro domacnosti, NE pro ICO!\nPOZOR: Max uvazek 12 mesicu. Poznamka pro MND max 300 znaku!\nPRO KOHO: Zakaznici s plynem, domacnosti s FVE.\nINFO: 800 400 500 | mnd@mnd.cz'},
  {id:'inn',n:'Innogy',link:'https://www.innogy.cz/ceniky/',tip:'Innogy je soucasti skupiny EON od 2021 - evropska firma s jistotou. Rekni: Innogy dnes patri pod EON, jednu z nejvetsich energetickych skupin v Evrope. To je ta zadruhova bezpecnost.',c:'PROFIL: Soucast skupiny EON od 2021, puvodne RWE. Silna pozice v plynu.\nPOZOR: Mezidodavatel na Innogy NE. Dodat vzdy prvni+druhou stranu smlouvy.\nPRO KOHO: Dlouholeti zakaznici RWE/Innogy kteri znaji znacku.\nINFO: 800 113 355 | info@innogy.cz'},

  {id:'ppa',n:'PPAS',link:'https://www.ppas.cz/',tip:'PPAS je historicky prazsky plynorensky podnik - stabilita pres 100 let. Rekni: PPAS zasobuje Prahu plynem jiz vice nez 100 let. To je ta traditce a jistota ktera se jinde nenajde.',c:'PROFIL: Prazska plynarenska, historicky dodavatel plynu, stabilita 100+ let.\nPOZOR: Yello a PPAS PLYN v Praze - prodavame bez omezeni po cele CR! Mezidodavatel NE. Export 17 prac. dni.\nPRO KOHO: Zakaznici co oceni historickou znacku, Praha a okoli.\nINFO: 800 134 134 | callcetrum@ppas.cz'},
  {id:'yel',n:'Yello',link:'https://www.yello.cz/cs/domacnost/',tip:'Yello je moderni digitalni znacka PRE - vse online, bez papiru, bez fronty. Rekni: Yello je online znacka Prazske energetiky - sjednate vse z mobilu za 5 minut a maji za sebou 100 let tradice PRE.',c:'PROFIL: Digitalni znacka skupiny PRE. Prodavame po CELE CR bez omezeni.\nSILNE STRANKY: Vse online, rychle sjednani, za sebou maji stabilitu PRE.\nPOZOR: Export smlouvy 17 prac. dni pred podanim vypovedi.\nPRO KOHO: Mladsi zakaznici, online komunikace, kdekoliv v CR.\nINFO: 267 056 704 | yello@yello.cz'},
  {id:'epe',n:'EPET',link:'https://epet.cz/',tip:'EPET ma jedny z nejkonkurencnejsich cen na trhu. Rekni: EPET neinvestuje do reklamy ani pobocek - ty usetrene penize da primo do ceny pro zakaznika.',c:'PROFIL: Mensi nezavisly dodavatel, konkurencni ceny, bez pobocek.\nDULEZITE: EPET - VZDY zakaznik sam vypovida! Informuj predem. Zakaznik doda akceptaci.\nPRO KOHO: Zakaznici kteri chteji nejnizsi cenu a zvladnou si zarizit vypoved sami.\nINFO: epet.cz'}

var curPhase = 0;
var drawerTab = 0;
var kbOpenId = null;
var kbOpenType = null;
var clients = JSON.parse(localStorage.getItem('sc2') || '[]');
var activeId = localStorage.getItem('sc2a') || null;
var phrases = JSON.parse(localStorage.getItem('sc2p') || '[]');

function gw() { return localStorage.getItem('sc2w') || WU; }
function sc() { localStorage.setItem('sc2', JSON.stringify(clients)); localStorage.setItem('sc2a', activeId || ''); }

function init() {
  document.getElementById('setupBtn').onclick = function() {
    var v = document.getElementById('setupInp').value.trim() || WU;
    localStorage.setItem('sc2w', v); start();
  };
  document.getElementById('setupInp').onkeydown = function(e) { if (e.key === 'Enter') document.getElementById('setupBtn').click(); };
  document.getElementById('changeUrlBtn').onclick = function() {
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  };
  document.getElementById('newClientBtn').onclick = openModal;
  document.getElementById('modalNo').onclick = closeModal;
  document.getElementById('modalYes').onclick = confirmModal;
  document.getElementById('modalBg').onclick = function(e) { if (e.target === this) closeModal(); };
  document.getElementById('modalInp').onkeydown = function(e) { if (e.key === 'Enter') confirmModal(); };


  document.getElementById('summaryBtn').onclick = doSummary;
  document.getElementById('drawerBtn').onclick = function() { openDrawer(drawerTab); };
  document.getElementById('drawerClose').onclick = closeDrawer;
  document.getElementById('overlay').onclick = closeDrawer;
  document.getElementById('dtab0').onclick = function() { openDrawer(0); };
  document.getElementById('dtab1').onclick = function() { openDrawer(1); };
  document.getElementById('dtab2').onclick = function() { openDrawer(2); };
  document.getElementById('dtab3').onclick = function() { openDrawer(3); };
  document.getElementById('dtab4').onclick = function() { openDrawer(4); };
  document.getElementById('sendBtn').onclick = sendMsg;
  document.getElementById('ibox').onkeydown = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } };
  document.getElementById('ibox').oninput = function() { rsz(this); };

  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('cpbtn')) {
      var t = e.target.getAttribute('data-c');
      navigator.clipboard.writeText(t).then(function() {
        e.target.textContent = 'Kopirovano'; e.target.classList.add('ok');
        setTimeout(function() { e.target.textContent = 'Kopirovat'; e.target.classList.remove('ok'); }, 2000);
      });
    }
    if (e.target.classList.contains('p-use')) fillInput(e.target.getAttribute('data-p'));
    if (e.target.classList.contains('p-del')) {
      phrases.splice(parseInt(e.target.getAttribute('data-i')), 1);
      localStorage.setItem('sc2p', JSON.stringify(phrases));
      renderDrawer();
    }
  });

  localStorage.setItem('sc2w', WU);
  start();
}

function start() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderPhases(); renderClients(); renderChips();
  setPhase(0);
  if (activeId && clients.find(function(c) { return c.id === activeId; })) selectClient(activeId);
}

function renderPhases() {
  var el = document.getElementById('phases');
  el.style.display = 'flex'; el.style.gap = '4px';
  el.innerHTML = PHASES.map(function(p, i) {
    return '<button class="ph' + (i === 0 ? ' on' : '') + '" data-i="' + i + '">' + p.n + '</button>';
  }).join('');
  el.querySelectorAll('.ph').forEach(function(b) {
    b.onclick = function() { setPhase(parseInt(this.getAttribute('data-i'))); };
  });
}

function setPhase(i) {
  curPhase = i;
  document.querySelectorAll('.ph').forEach(function(b, j) { b.classList.toggle('on', j === i); });
  document.getElementById('scriptHint').classList.add('vis');
  document.getElementById('scriptTxt').innerHTML = PHASES[i].s;
  renderChips();
}

function renderChips() {
  var bar = document.getElementById('chips');
  var chips = PHASES[curPhase].c || [];
  bar.innerHTML = chips.map(function(c) {
    return '<span class="chip" data-t="' + c.replace(/"/g, '&quot;') + '">' + c + '</span>';
  }).join('');
  bar.querySelectorAll('.chip').forEach(function(ch) {
    ch.onclick = function() { fillInput(this.getAttribute('data-t')); };
  });
}

function openDrawer(tab) {
  drawerTab = tab;
  [0,1,2,3,4].forEach(function(i) { document.getElementById('dtab' + i).classList.toggle('on', i === tab); });
  kbOpenId = null; kbOpenType = null;
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('vis');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('vis');
}

function renderDrawer() {
  var el = document.getElementById('drawerContent');
  if (kbOpenId) { renderKbDetail(el); return; }
  if (drawerTab === 0) renderKbList(el);
  else if (drawerTab === 1) renderDodList(el);
  else if (drawerTab === 2) renderArgList(el);
  else if (drawerTab === 3) renderPhrases(el);
  else renderQuotes(el);
}

function renderArgList(el) {
  var cats = [];
  ARGS.forEach(function(a) { if (cats.indexOf(a.cat) < 0) cats.push(a.cat); });
  el.innerHTML = cats.map(function(cat) {
    return '<div class="kb-cat">' + cat + '</div>' +
      ARGS.filter(function(a) { return a.cat === cat; }).map(function(a) {
        return '<div class="kb-row" data-id="' + a.id + '" data-tp="arg">' + a.t + '</div>';
      }).join('');
  }).join('');
  el.querySelectorAll('.kb-row').forEach(function(r) {
    r.onclick = function() { kbOpenId = this.getAttribute('data-id'); kbOpenType = 'arg'; renderDrawer(); };
  });
}

function renderKbList(el) {
  var cats = [];
  KB.forEach(function(k) { if (cats.indexOf(k.cat) < 0) cats.push(k.cat); });
  el.innerHTML = cats.map(function(cat) {
    return '<div class="kb-cat">' + cat + '</div>' +
      KB.filter(function(k) { return k.cat === cat; }).map(function(k) {
        return '<div class="kb-row" data-id="' + k.id + '" data-tp="kb">' + k.t + '</div>';
      }).join('');
  }).join('');
  el.querySelectorAll('.kb-row').forEach(function(r) {
    r.onclick = function() { kbOpenId = this.getAttribute('data-id'); kbOpenType = 'kb'; renderDrawer(); };
  });
}

function renderDodList(el) {
  el.innerHTML = '<div class="kb-cat">Dodavatele</div>' +
    DODAV.map(function(d) {
      return '<div class="kb-row" data-id="' + d.id + '">' + d.n + '</div>';
    }).join('');
  el.querySelectorAll('.kb-row').forEach(function(r) {
    r.onclick = function() { kbOpenId = this.getAttribute('data-id'); kbOpenType = 'dod'; renderDrawer(); };
  });
}

function renderKbDetail(el) {
  var item;
  if (kbOpenType === 'dod') item = DODAV.find(function(d) { return d.id === kbOpenId; });
  else if (kbOpenType === 'arg') item = ARGS.find(function(a) { return a.id === kbOpenId; });
  else item = KB.find(function(k) { return k.id === kbOpenId; });
  if (!item) return;
  var title = item.n || item.t;
  var link = item.link ? '<a class="kb-detail-link" href="' + item.link + '" target="_blank">Cenik &rarr;</a>' : '';
  var tip = item.tip ? '<div class="kb-detail-tip"><strong>PRODEJNI TIP</strong>' + esc(item.tip) + '</div>' : '';
  var askBtn = '<button class="kb-ask-btn" id="kbAskInner">Zeptat se AI na toto</button>';
  el.innerHTML = '<div class="kb-detail-view vis">' +
    '<button class="kb-back" id="kbBackBtn">&#8592; Zpet</button>' +
    '<div style="display:flex;align-items:center;gap:10px;"><div class="kb-detail-title">' + esc(title) + '</div>' + link + '</div>' +
    '<div class="kb-detail-content">' + esc(item.c) + '</div>' +
    tip + askBtn + '</div>';
  document.getElementById('kbBackBtn').onclick = function() { kbOpenId = null; kbOpenType = null; renderDrawer(); };
  document.getElementById('kbAskInner').onclick = function() {
    closeDrawer(); fillInput('Vysvetli a porad mi jak prodat: ' + title);
  };
}

function renderQuotes(el) {
  var daily = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  var html = '<div style="background:var(--acd);border:1px solid var(--acb);border-radius:12px;padding:16px 18px;margin-bottom:12px;font-size:13px;color:var(--ac);line-height:1.7;font-style:italic;">';
  html += '"' + esc(daily) + '"';
  html += '<div style="margin-top:10px;"><button id="nqb" style="padding:5px 12px;background:transparent;border:1px solid var(--acb);border-radius:6px;color:var(--ac);font-size:11px;cursor:pointer;">Dalsi citat</button></div>';
  html += '</div>';
  html += '<div style="font-size:9px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;padding:4px 0 8px;">Vsechny citaty</div>';
  QUOTES.forEach(function(q) {
    html += '<div class="qrow" style="padding:10px 12px;border-radius:8px;background:var(--bg3);margin-bottom:6px;font-size:12px;color:var(--tx2);line-height:1.6;border-left:2px solid var(--brd);cursor:pointer;" data-q="' + q.replace(/"/g, '&quot;') + '">' + esc(q) + '</div>';
  });
  el.innerHTML = html;
  var nb = document.getElementById('nqb');
  if (nb) nb.onclick = function() { renderQuotes(el); };
  el.querySelectorAll('.qrow').forEach(function(r) {
    r.onclick = function() { fillInput(this.getAttribute('data-q')); closeDrawer(); };
  });
}
function renderPhrases(el) {
  if (!phrases.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--tx3);padding:8px;">Zadne fraze. Pridej prvni!</div>' + addPhraseHtml();
  } else {
    el.innerHTML = phrases.map(function(p, i) {
      return '<div class="phrase-item"><span>' + esc(p) + '</span>' +
        '<button class="p-use" data-p="' + p.replace(/"/g,'&quot;') + '">Pouzit</button>' +
        '<button class="p-del" data-i="' + i + '">x</button></div>';
    }).join('') + addPhraseHtml();
  }
  document.getElementById('phraseAddBtn').onclick = addPhrase;
  document.getElementById('phraseInp').onkeydown = function(e) { if (e.key === 'Enter') addPhrase(); };
}

function addPhraseHtml() {
  return '<div class="add-phrase"><input type="text" id="phraseInp" placeholder="Pridat frazi..." /><button id="phraseAddBtn">+ Pridat</button></div>';
}

function addPhrase() {
  var inp = document.getElementById('phraseInp');
  var v = inp.value.trim(); if (!v) return;
  phrases.push(v); localStorage.setItem('sc2p', JSON.stringify(phrases));
  inp.value = ''; renderDrawer();
}

function getInits(n) { return n.trim().split(/\s+/).map(function(w) { return w[0]; }).join('').toUpperCase().slice(0,2) || '?'; }
function stCls(s) { return {z:'s-z',r:'s-r',u:'s-u',n:'s-n'}[s] || ''; }
function stLbl(s) { return {z:'Zajem',r:'Rozmysli',u:'Uzavreno',n:'Nezajem'}[s] || ''; }

function renderClients() {
  var el = document.getElementById('clientsList');
  if (!clients.length) { el.innerHTML = '<div style="font-size:12px;color:var(--tx3);padding:8px 6px;">Zadni klienti</div>'; return; }
  el.innerHTML = clients.map(function(c) {
    return '<div class="ci' + (c.id === activeId ? ' on' : '') + '" data-id="' + c.id + '">' +
      '<div class="ci-av">' + getInits(c.name) + '</div>' +
      '<div class="ci-info">' +
        '<div class="ci-name">' + esc(c.name) + '</div>' +
        '<select class="ci-st-sel" data-cid="' + c.id + '" onclick="event.stopPropagation()">' +
          '<option value="" ' + (!c.status ? 'selected' : '') + '>-- stav --</option>' +
          '<option value="z" ' + (c.status==='z' ? 'selected' : '') + '>Zajem</option>' +
          '<option value="r" ' + (c.status==='r' ? 'selected' : '') + '>Rozmysli</option>' +
          '<option value="u" ' + (c.status==='u' ? 'selected' : '') + '>Uzavreno</option>' +
          '<option value="n" ' + (c.status==='n' ? 'selected' : '') + '>Nezajem</option>' +
        '</select>' +
      '</div>' +
      '<button class="ci-del" data-del="' + c.id + '">x</button>' +
    '</div>';
  }).join('');
  el.querySelectorAll('.ci').forEach(function(el) {
    el.onclick = function(e) {
      if (e.target.classList.contains('ci-del')) return;
      selectClient(this.getAttribute('data-id'));
    };
  });
  el.querySelectorAll('.ci-del').forEach(function(b) {
    b.onclick = function(e) { e.stopPropagation(); delClient(this.getAttribute('data-del')); };
  });
  el.querySelectorAll('.ci-st-sel').forEach(function(s) {
    s.onchange = function(e) {
      e.stopPropagation();
      var cid = this.getAttribute('data-cid');
      var c2 = clients.find(function(x) { return x.id === cid; });
      if (c2) { c2.status = this.value; sc(); }
    };
  });
}

function selectClient(id) {
  activeId = id; sc(); renderClients();
  var c = clients.find(function(x) { return x.id === id; });
  if (!c) return;
  document.getElementById('tbName').textContent = c.name;
  var n = c.history.filter(function(h) { return h.role === 'user'; }).length;
  document.getElementById('tbSub').textContent = n ? (n + ' zprav i ' + stLbl(c.status)) : 'Zadej prvni namitku';


  renderChat();
}

function saveStatus(v) {
  var c = clients.find(function(x) { return x.id === activeId; });
  if (!c) return;
  c.status = v; sc(); renderClients();
  document.getElementById('tbSub').textContent = c.history.filter(function(h) { return h.role === 'user'; }).length + ' zprav i ' + stLbl(v);
}



function delClient(id) {
  if (!confirm('Smazat klienta?')) return;
  clients = clients.filter(function(c) { return c.id !== id; });
  if (activeId === id) activeId = clients.length ? clients[0].id : null;
  sc(); renderClients();
  if (activeId) selectClient(activeId);
  else { document.getElementById('tbName').textContent = 'Vyberte klienta'; renderChat(); }
}

function openModal() {
  document.getElementById('modalBg').classList.add('on');
  document.getElementById('modalInp').value = '';
  setTimeout(function() { document.getElementById('modalInp').focus(); }, 50);
}
function closeModal() { document.getElementById('modalBg').classList.remove('on'); }
function confirmModal() {
  var name = document.getElementById('modalInp').value.trim();
  if (!name) return;
  var id = 'c' + Date.now();
  clients.push({id:id,name:name,history:[],status:'',notes:''});
  sc(); closeModal(); renderClients(); selectClient(id);
}

function renderChat() {
  var c = clients.find(function(x) { return x.id === activeId; });
  var area = document.getElementById('chat');
  area.style.display = 'flex';
  if (!c || !c.history.length) {
    area.innerHTML = '<div class="empty"><div class="empty-ico">&#9889;</div><div class="empty-t">Chat je prazdny</div><div class="empty-s">Zadej namitku klienta nebo dotaz pouzij zkratky nize.</div></div>';
    return;
  }
  area.innerHTML = c.history.map(function(m) {
    if (m.role === 'user') return '<div class="msg-u"><div><div class="msg-lbl">NAMITKA / DOTAZ</div><div class="msg-bbl">' + esc(m.content) + '</div></div></div>';
    return renderAI(m.content);
  }).join('');
  area.scrollTop = area.scrollHeight;
}

function renderAI(d) {
  if (d.type === 'loading') return '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  if (d.type === 'error') return '<div class="err-card">' + esc(d.text) + '</div>';
  if (d.type === 'summary') return '<div class="summary"><strong>SHRNUTI HOVORU</strong>' + esc(d.text) + '</div>';
  if (d.type === 'info') {
    var ctip = d.customer_tip ? '<div class="info-ctip"><strong>JAK TO RICT ZAKAZNIKOVI</strong>' + esc(d.customer_tip) + '</div>' : '';
    return '<div class="ai-wrap"><div class="info-card"><div class="info-top"><span class="badge badge-i">ODPOVED</span>' + cpbtn(d.text) + '</div><div class="info-body"><div class="info-txt">' + esc(d.text) + '</div>' + ctip + '</div></div></div>';
  }
  if (d.type === 'objection') {
    var an = d.analysis ? '<div class="situation"><span class="situation-lbl">CO KLIENTOVI CHYBI</span>' + esc(d.analysis) + '</div>' : '';
    var responses = d.responses || [];
    var cards = responses.map(function(r) {
      return renderFlowCard(r);
    }).join('');
    return '<div class="ai-wrap">' + an + cards + '</div>';
  }
  // fallback
  var an2 = d.analysis ? '<div class="situation"><span class="situation-lbl">SITUACE</span>' + esc(d.analysis) + '</div>' : '';
  var cards2 = (d.responses || []).map(function(r) { return renderFlowCard(r); }).join('');
  return '<div class="ai-wrap">' + an2 + cards2 + '</div>';
}

function renderFlowCard(r) {
  var text = r.text || '';
  // Parse POCHOPENI / REFRAME / CLOSE OTAZKA from text
  var steps = [];
  var lines = text.split('\n');
  var currentStep = null;
  var currentText = [];

  lines.forEach(function(line) {
    line = line.trim();
    if (!line) return;
    var isPoch = /^POCHOPENI/i.test(line);
    var isRef = /^REFRAME/i.test(line);
    var isClose = /^CLOSE/i.test(line);
    if (isPoch || isRef || isClose) {
      if (currentStep) steps.push({label: currentStep.label, color: currentStep.color, text: currentText.join(' ').trim()});
      currentStep = {
        label: isPoch ? 'POCHOPENI' : isRef ? 'REFRAME' : 'CLOSE OTAZKA',
        color: isPoch ? 'var(--gn)' : isRef ? 'var(--am)' : 'var(--ac)'
      };
      // Get text after the colon
      var colonIdx = line.indexOf(':');
      if (colonIdx >= 0) currentText = [line.slice(colonIdx+1).trim()];
      else currentText = [];
    } else {
      if (currentStep) currentText.push(line);
    }
  });
  if (currentStep && currentText.length) steps.push({label: currentStep.label, color: currentStep.color, text: currentText.join(' ').trim()});

  var inner = '';
  if (steps.length >= 2) {
    inner = steps.map(function(s) {
      return '<div style="margin-bottom:10px;padding:10px 14px;border-radius:8px;background:var(--bg);border-left:3px solid ' + s.color + ';">' +
        '<div style="font-size:9px;font-family:DM Mono,monospace;letter-spacing:.1em;color:' + s.color + ';font-weight:600;margin-bottom:5px;">' + s.label + '</div>' +
        '<div style="font-size:13.5px;line-height:1.7;color:var(--tx);">' + esc(s.text) + '</div>' +
        '</div>';
    }).join('');
  } else {
    inner = '<div style="font-size:13.5px;line-height:1.75;color:var(--tx);white-space:pre-line;">' + esc(text) + '</div>';
  }

  var nextHtml = r.next ? '<div class="rcard-next">' + esc(r.next) + '</div>' : '';
  var badge = r.style === 'FLOW' ? 'INSTANT REBUTTAL' : (r.style || 'ODPOVED');
  var badgeCls = 'badge-p';

  return '<div class="rcard" style="margin-bottom:8px;">' +
    '<div class="rcard-top"><span class="badge ' + badgeCls + '">' + esc(badge) + '</span>' + cpbtn(text) + '</div>' +
    '<div class="rcard-body">' + inner + nextHtml + '</div>' +
    '</div>';
}

function cpbtn(t) { return '<button class="cpbtn" data-c="' + t.replace(/"/g,'&quot;') + '">Kopirovat</button>'; }
function fillInput(t) { var b = document.getElementById('ibox'); b.value = t; b.focus(); rsz(b); }
function rsz(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

function buildPrompt(pi, hist) {
  var ph = PHASES[pi];
  var h = hist.slice(-3).filter(function(x) { return x.role === 'user'; }).map(function(x) { return x.content; }).join(', ');
  var km = {0:['tip'],1:['tip'],2:['tip'],3:['dok','tip'],4:['dok','tip'],5:['tip','mez','auk']};
  var ri = km[pi] || ['tip'];
  var kb = KB.filter(function(k) { return ri.indexOf(k.id) >= 0; }).map(function(k) { return k.t + ': ' + k.c.slice(0,150); }).join(' | ');
  var dv = DODAV.map(function(d) { return d.n + ': ' + d.c.slice(0,100); }).join(' | ');
  var argsText = ARGS.map(function(a) { return a.t + ': ' + a.c.slice(0,150); }).join(' | ');
  var L = [
    'Jsi senior obchodnik s 15 lety zkusenosti v energetice CR. Prodavas po telefonu pro Usetreno.cz.',
    'Styl: stucny, sebevdomy, prirozeny. Mluvis jako zkuseny clovek - ne jako robot.',
    '',
    'AKTUALNI FAZE: ' + ph.n + '. CIL: ' + (ph.goal || ''),
    'Predchozi namitky: ' + (h || 'zadne'),
    '',
    'Znalosti: ' + kb,
    'Top argumenty a techniky: ' + argsText,
    'Mindset a inner game: Prodej = prenos jistoty. State management pred hovorem. Three 10s: produkt/ty/firma. Radiator metafora - nejdriv zahrej sebe pak klienta.',
    'Dodavatele: ' + dv,
    '',
    'DULEZITE - RESPONDUJES JINAK DLE FAZE:',
    'UVOD: jen navazovat kontakt, dostat se dal. Zadne prodavani.',
    'DUVOD: zjistovat pain, ptat se. Odpovedi vedou k dalsim otazkam.',
    'DUVERA: budovat Three 10s jistotu - produkt, ty, firma.',
    'FAKTURA: pomoc s navigaci k fakture.',
    'PREFERENCE: potvrdit preference, zvladat namitky na dodavatele.',
    'UZAVRENI: assumption close, tuzka papir. Neptat se - vest k ANO.',
    '',
    'FORMAT ODPOVEDI NA NAMITKU - vzdy 3 kroky jako plynuly flow:',
    'Krok 1 POCHOPENI: 1 veta ktera sundate obranu. Klient musi citit ze ho chapeme.',
    'Krok 2 REFRAME: 1 veta ktera preformuluje situaci ve prospech prodeje.',
    'Krok 3 CLOSE OTAZKA: 1 otazka ktera vrati klienta do flow nebo vede k ANO.',
    '',
    'PRIKLAD - namitka: poslete mi to do mailu',
    'Pochopeni: Jasne, chapu ze si to chcete projit v klidu...',
    'Reframe: ...jen vetsinou kdyz to poslu, lide se k tomu uz nevriii...',
    'Close otazka: co byste potreboval slyset ted, abyste se mohl rozhodnout rovnou?',
    '',
    'PRIKLAD - namitka: nechci Centropol / nechci fixovat',
    'Pochopeni: Rozumim, to je uplne v poradku...',
    'Reframe: ...vetsina lidi kteri to nejdrive odmitli, pozdeji rikali ze by to vzali zpet kdyz videli ceny...',
    'Close otazka: co konkretne vam na Centropolu nedava smysl - at se na to podivame?',
    '',
    'PRIKLAD - namitka: musim se poradit s manzelkou',
    'Pochopeni: Jasne, to dava smysl...',
    'Reframe: ...otazka je jestli ona bude mit problem s tim ze budete platit mene...',
    'Close otazka: co si myslite ze by ona rekla kdyby vedela o te uspore?',
    '',
    'VYUZIVEJ SITUACI NA TRHU kde pomaha uzavrit:',
    'Katar zastavil tezbu, Evropa ma zasobniky z 30%, ceny porostou. Kdo nezafixuje ted, podepise v lete za vic.',
    '',
    'FORMAT pro NAMITKU KLIENTA:',
    '{"type":"objection","analysis":"co klientovi chybi ze Three 10s","responses":[{"style":"FLOW","text":"POCHOPENI: [1 veta]\nREFRAME: [1 veta]\nCLOSE OTAZKA: [1 otazka]","next":"pokud rekne ano: tuzka papir cena uzavreni"}]}',
    '',
    'FORMAT pro DOTAZ OBCHODNIKA:',
    '{"type":"info","text":"prakticka odpoved jako od zkuseneho kolegy","customer_tip":"presna veta jak to rict zakaznikovi v hovoru"}',
    '',
    'KRITICKY: Pouze cisty JSON. Zadny text pred { ani po }. Zadne backticks.'
  ];
  return L.join('\n');
}

async function doSummary() {
  if (!activeId) { alert('Nejprve vyber klienta.'); return; }
  var c = clients.find(function(x) { return x.id === activeId; });
  if (!c || c.history.filter(function(h) { return h.role === 'user'; }).length < 2) { alert('Prilis malo zprav.'); return; }
  document.getElementById('sendBtn').disabled = true;
  c.history.push({role:'ai', content:{type:'loading'}});
  renderChat();
  var ht = c.history.filter(function(h) { return h.role === 'user'; }).map(function(h) { return h.content; }).join(', ');
  try {
    var r = await fetch(gw(), {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-5',max_tokens:300,
      system:'Jsi asistent. Shrnuj hovory stucne v cestine. Odpovez POUZE JSON: {"type":"summary","text":"shrnuti max 4 vety - co klient rikal, aktualni stav, doporuceny dalsi krok"}. Zadne backticks.',
      messages:[{role:'user',content:'Shrnuti hovoru. Namitky: ' + ht}]
    })});
    var data = await r.json();
    var raw = data.content && data.content[0] ? data.content[0].text : '';
    var parsed; try { var bt=String.fromCharCode(96); var cl=raw.split(bt+'json').join('').split(bt).join('').trim(); var ji=cl.indexOf('{'); if(ji>0)cl=cl.slice(ji); var je=cl.lastIndexOf('}'); if(je>=0)cl=cl.slice(0,je+1); parsed=JSON.parse(cl); } catch(e) { parsed={type:'summary',text:raw}; }
    c.history[c.history.length-1] = {role:'ai',content:parsed};
  } catch(e) { c.history[c.history.length-1] = {role:'ai',content:{type:'error',text:'Chyba: ' + e.message}}; }
  document.getElementById('sendBtn').disabled = false;
  sc(); renderChat();
}

async function sendMsg() {
  if (!activeId) { alert('Nejprve vyber klienta.'); return; }
  var box = document.getElementById('ibox');
  var text = box.value.trim(); if (!text) return;
  var c = clients.find(function(x) { return x.id === activeId; });
  box.value = ''; rsz(box);
  document.getElementById('sendBtn').disabled = true;
  c.history.push({role:'user',content:text});
  c.history.push({role:'ai',content:{type:'loading'}});
  sc(); renderChat();
  try {
    var r = await fetch(gw(), {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-5',max_tokens:500,
      system:buildPrompt(curPhase, c.history.slice(0,-2)),
      messages:[{role:'user',content:text}]
    })});
    if (!r.ok) { var e2=await r.json(); throw new Error(e2.error?e2.error.message:'HTTP '+r.status); }
    var data = await r.json();
    var raw = data.content && data.content[0] ? data.content[0].text : '';
    var parsed;
    try {
      var bt = String.fromCharCode(96);
      var cl = raw.split(bt + 'json').join('').split(bt).join('').trim();
      var ji = cl.indexOf('{');
      if (ji > 0) cl = cl.slice(ji);
      var je = cl.lastIndexOf('}');
      if (je >= 0) cl = cl.slice(0, je+1);
      parsed = JSON.parse(cl);
    } catch(e) { parsed = {type:'info', text:raw}; }
    c.history[c.history.length-1] = {role:'ai',content:parsed};
  } catch(e) { c.history[c.history.length-1] = {role:'ai',content:{type:'error',text:'Chyba: ' + e.message}}; }
  document.getElementById('sendBtn').disabled = false;
  var n = c.history.filter(function(h) { return h.role === 'user'; }).length;
  document.getElementById('tbSub').textContent = n + ' zprav' + (c.status ? ' i ' + stLbl(c.status) : '');
  sc(); renderChat();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
